<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukuma（無垢間）</title>
<meta name="description" content="無垢間 — pure space for honest thought.">
<meta name="robots" content="noindex">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,-apple-system,sans-serif;
    background:#FAF8F5;
    color:#2C2C2A;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:2rem;
  }
  .wrap{max-width:400px}
  h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif;
    font-size:1.8rem;
    font-weight:400;
    letter-spacing:0.12em;
    margin-bottom:0.5rem;
  }
  .en{
    font-size:0.85rem;
    color:#888780;
    letter-spacing:0.06em;
    margin-bottom:2rem;
  }
  .tagline{
    font-size:0.9rem;
    color:#5F5E5A;
    line-height:1.8;
  }
  .contact{
    margin-top:2.5rem;
    font-size:0.75rem;
    color:#B4B2A9;
  }
  .contact a{color:#B4B2A9;text-decoration:none}
  .contact a:hover{color:#5F5E5A}
  @media(prefers-color-scheme:dark){
    body{background:#1C1C1E;color:#E5E5E3}
    .en{color:#888780}
    .tagline{color:#B4B2A9}
    .contact{color:#5F5E5A}
    .contact a{color:#5F5E5A}
    .contact a:hover{color:#B4B2A9}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>無垢間</h1>
  <p class="en">Mukuma</p>
  <p class="tagline">A pure space for honest thought.</p>
  <p class="contact"><a href="mailto:hello@mukuma.com">hello@mukuma.com</a></p>
</div>
</body>
</html>
