<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukuma（無垢間）</title>
<meta name="description" content="無垢間 — Mukuma">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,-apple-system,sans-serif;
    background:#FAF8F5;
    color:#2C2C2A;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:2rem;
    transition:background 0.3s,color 0.3s;
  }
  .wrap{
    text-align:center;
    max-width:460px;
  }

  .logo{
    display:inline-flex;
    align-items:center;
    gap:12px;
    margin-bottom:3rem;
  }
  .logo-mark{width:56px;height:56px;flex-shrink:0}
  .logo-mark svg path,.logo-mark svg line{transition:stroke 0.3s}
  .logo-text{text-align:left}
  .logo-jp{
    font-family:"Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif;
    font-size:1.7rem;
    font-weight:400;
    letter-spacing:0.1em;
    line-height:1.2;
    transition:color 0.3s;
  }
  .logo-en{
    font-size:0.7rem;
    color:#B4B2A9;
    letter-spacing:0.2em;
    text-transform:uppercase;
    margin-top:3px;
    transition:color 0.3s;
  }

  .divider{
    width:32px;
    height:1px;
    background:rgba(44,44,42,0.1);
    margin:0 auto 2rem;
    transition:background 0.3s;
  }

  .status{
    font-size:0.85rem;
    color:#888780;
    letter-spacing:0.06em;
    margin-bottom:0.4rem;
    transition:color 0.3s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .status-en{
    font-size:0.75rem;
    color:#B4B2A9;
    letter-spacing:0.04em;
    transition:color 0.3s;
  }

  .pulse-dot{
    width:5px;
    height:5px;
    border-radius:50%;
    background:#B4B2A9;
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.25;transform:scale(0.9)}
    50%{opacity:0.8;transform:scale(1.1)}
  }

  .contact{
    margin-top:3.5rem;
    font-size:0.78rem;
    color:#B4B2A9;
    line-height:1.8;
    transition:color 0.3s;
  }
  .contact-label{
    font-size:0.7rem;
    color:#D3D1C7;
    letter-spacing:0.04em;
    margin-bottom:2px;
    transition:color 0.3s;
  }
  .contact a{
    color:#888780;
    text-decoration:none;
    border-bottom:1px solid rgba(44,44,42,0.08);
    padding-bottom:1px;
    transition:color 0.3s,border-color 0.3s;
  }
  .contact a:hover{
    color:#2C2C2A;
    border-bottom-color:rgba(44,44,42,0.2);
  }

  .theme-toggle{
    position:fixed;
    top:1.25rem;
    right:1.25rem;
    width:36px;
    height:36px;
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    transition:background 0.2s;
    z-index:100;
  }
  .theme-toggle:hover{background:rgba(44,44,42,0.05)}
  .theme-toggle svg{width:18px;height:18px;position:absolute;transition:opacity 0.4s ease,transform 0.4s ease}
  .icon-sun{color:#888780;opacity:1;transform:rotate(0deg)}
  .icon-moon{color:#888780;opacity:0;transform:rotate(-90deg)}

  /* Brush painting animation */
  .mark-frame{
    stroke-dasharray:160;
    stroke-dashoffset:160;
    stroke-linecap:round;
    animation:brushFrame 2s cubic-bezier(0.15,0,0.2,1) 0.3s forwards;
  }
  .mark-stroke{
    stroke-dasharray:24;
    stroke-dashoffset:24;
    stroke-linecap:round;
    animation:brushStroke 0.6s cubic-bezier(0.3,0,0.1,1) 1.6s forwards;
  }

  @keyframes brushFrame{
    to{stroke-dashoffset:0}
  }
  @keyframes brushStroke{
    to{stroke-dashoffset:0}
  }
  @keyframes fadeIn{
    to{opacity:1}
  }

  /* Staggered content reveal */
  .logo-text{opacity:0;animation:fadeIn 0.6s ease 1.2s forwards}
  .divider{opacity:0;animation:fadeIn 0.4s ease 1.9s forwards}
  .status-wrap{opacity:0;animation:fadeIn 0.4s ease 2.2s forwards}
  .contact{opacity:0;animation:fadeIn 0.4s ease 2.5s forwards}
  .theme-toggle{opacity:0;animation:fadeIn 0.4s ease 2.7s forwards}

  @media(prefers-reduced-motion:reduce){
    .mark-frame{stroke-dashoffset:0;animation:none}
    .mark-stroke{stroke-dashoffset:0;animation:none}
    .logo-text,.divider,.status-wrap,.contact,.theme-toggle{opacity:1;animation:none}
    .pulse-dot{animation:none;opacity:0.5}
  }

  /* Dark mode */
  body.dark{background:#1C1C1E;color:#E5E5E3}
  body.dark .logo-mark svg path{stroke:#E5E5E3}
  body.dark .logo-mark svg line{stroke:#E5E5E3}
  body.dark .logo-jp{color:#E5E5E3}
  body.dark .logo-en{color:#5F5E5A}
  body.dark .divider{background:rgba(255,255,255,0.06)}
  body.dark .status{color:#888780}
  body.dark .status-en{color:#5F5E5A}
  body.dark .pulse-dot{background:#5F5E5A}
  body.dark .contact{color:#5F5E5A}
  body.dark .contact-label{color:#444441}
  body.dark .contact a{color:#888780;border-bottom-color:rgba(255,255,255,0.06)}
  body.dark .contact a:hover{color:#E5E5E3;border-bottom-color:rgba(255,255,255,0.15)}
  body.dark .theme-toggle:hover{background:rgba(255,255,255,0.06)}
  body.dark .icon-sun{opacity:0;transform:rotate(90deg)}
  body.dark .icon-moon{opacity:1;transform:rotate(0deg)}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <circle cx="12" cy="12" r="4.5"/>
    <line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/>
    <line x1="4.2" y1="4.2" x2="6" y2="6"/><line x1="18" y1="18" x2="19.8" y2="19.8"/>
    <line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/>
    <line x1="4.2" y1="19.8" x2="6" y2="18"/><line x1="18" y1="6" x2="19.8" y2="4.2"/>
  </svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </svg>
</button>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="mark-frame" d="M13 8 L35 8 C37.76 8 40 10.24 40 13 L40 35 C40 37.76 37.76 40 35 40 L13 40 C10.24 40 8 37.76 8 35 L8 13 C8 10.24 10.24 8 13 8 Z" stroke="#2C2C2A" stroke-width="1.5" fill="none"/>
        <line class="mark-stroke" x1="24" y1="14" x2="24" y2="34" stroke="#2C2C2A" stroke-width="1.5" opacity="0.45"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="logo-jp">無垢間</div>
      <div class="logo-en">Mukuma</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status-wrap">
    <p class="status">準備中 <span class="pulse-dot"></span></p>
    <p class="status-en">Coming soon</p>
  </div>

  <div class="contact">
    <p class="contact-label">ご質問・お問い合わせ</p>
    <p><a href="mailto:hello@mukuma.com">hello@mukuma.com</a></p>
  </div>
</div>
<script>
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('mukuma-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
(function(){
  var saved = localStorage.getItem('mukuma-theme');
  if(saved){
    if(saved === 'dark') document.body.classList.add('dark');
  } else if(window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.body.classList.add('dark');
  }
})();
</script>
</body>
</html>
